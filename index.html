<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All India LMP Map</title>
    <meta name="description" content="Simple interactive viewer for All India LMP maps.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="page-shell">
        <header class="page-header">
            <h1>All India LMP Map</h1>
        </header>

        <section class="selector-panel">
            <label for="mapSelector">Case Selector</label>
            <select id="mapSelector" aria-label="Case selector"></select>
        </section>

        <section class="map-panel">
            <iframe
                id="mapFrame"
                title="All India LMP map viewer"
                loading="lazy"
                referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
